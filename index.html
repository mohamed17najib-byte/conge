<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO — English -->
    <title>CongéPlus — Leave Optimizer 2026 | Public Holidays & Long Weekends</title>
    <meta name="description" content="Maximize your days off in 2026. CongéPlus finds the best periods to take leave by leveraging public holidays and weekends in 30+ countries." />
    <meta name="keywords" content="leave optimizer 2026, public holidays, long weekends, bridge days, day off planner, congé 2026, jours fériés, optimiser vacances, pont 2026, عطل, إجازات, تحسين الإجازات" />
    <meta name="author" content="CongéPlus" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://congeplus.com/" />

    <!-- Hreflang for multi-language SEO -->
    <link rel="alternate" hreflang="en" href="https://congeplus.com/?lang=en" />
    <link rel="alternate" hreflang="fr" href="https://congeplus.com/?lang=fr" />
    <link rel="alternate" hreflang="ar" href="https://congeplus.com/?lang=ar" />
    <link rel="alternate" hreflang="x-default" href="https://congeplus.com/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CongéPlus — Leave Optimizer 2026 | Optimiseur de Congés | محسّن الإجازات" />
    <meta property="og:description" content="Maximize your days off by leveraging public holidays and weekends in 30+ countries. Disponible en français, anglais et arabe." />
    <meta property="og:url" content="https://congeplus.com/" />
    <meta property="og:image" content="https://congeplus.com/og-image.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="ar_SA" />
    <meta property="og:site_name" content="CongéPlus" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CongéPlus — Leave Optimizer 2026" />
    <meta name="twitter:description" content="Find the best time to take leave in 30+ countries. Available in English, French & Arabic." />
    <meta name="twitter:image" content="https://congeplus.com/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "CongéPlus",
      "url": "https://congeplus.com",
      "description": "Leave optimizer — find the best periods to take time off by leveraging public holidays in 30+ countries.",
      "applicationCategory": "Productivity",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "inLanguage": ["en", "fr", "ar"],
      "availableLanguage": [
        { "@type": "Language", "name": "English" },
        { "@type": "Language", "name": "French" },
        { "@type": "Language", "name": "Arabic" }
      ]
    }
    </script>

    <!-- Set lang & dir dynamically based on stored preference -->
    <script>
      (function() {
        var lang = localStorage.getItem('congeplus-lang') || 'en';
        var dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.setAttribute('lang', lang);
        document.documentElement.setAttribute('dir', dir);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NSXC9XYGR3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NSXC9XYGR3');
    </script>
  </body>
</html>
