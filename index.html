          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Dans certaines entreprises marocaines avec une semaine de 6 jours, si vous posez un congé le vendredi, le samedi est aussi compté comme jour de congé. Sauf si le vendredi est un jour férié, alors le samedi reste libre. CongéPlus prend en compte cette règle."
          }
        },
        {
          "@type": "Question",

          }
        }
